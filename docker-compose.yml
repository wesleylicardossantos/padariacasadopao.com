version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      CONTAINER_ROLE: app
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_DATABASE: saas_enterprise
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: saas
      MYSQL_PASSWORD: saas
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      CONTAINER_ROLE: queue
    depends_on:
      - app
      - redis
      - mysql

volumes:
  mysql_data:
